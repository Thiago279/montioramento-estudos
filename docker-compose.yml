version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: tracker_estudos_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: tracker_estudos
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
